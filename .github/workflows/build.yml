name: Build & Release

on:
  workflow_dispatch:       # Manual trigger from GitHub UI
  push:
    tags:
      - 'v*'               # Auto-build on version tags (v0.1.0, v0.2.0, etc.)

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            label: macOS-arm64
          - platform: macos-13
            args: ''
            label: macOS-x64
          - platform: windows-latest
            args: ''
            label: Windows-x64
          - platform: ubuntu-22.04
            args: ''
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ contains(matrix.args, 'aarch64-apple-darwin') && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── Cache static FFmpeg build (macOS / Linux) ──────────────
      - name: Cache FFmpeg static build
        if: matrix.platform != 'windows-latest'
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ffmpeg-build/install
          key: ffmpeg-static-7.1-${{ matrix.label }}-v2

      # ── macOS: build static FFmpeg ─────────────────────────────
      - name: Build static FFmpeg (macOS)
        if: contains(matrix.platform, 'macos') && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          set -e
          NPROC=$(sysctl -n hw.ncpu)
          BUILD_DIR="$PWD/ffmpeg-build"
          PREFIX="$BUILD_DIR/install"
          mkdir -p "$BUILD_DIR" && cd "$BUILD_DIR"

          # nasm (needed by x264)
          curl -sL "https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/nasm-2.16.03.tar.xz" -o nasm.tar.xz
          tar xf nasm.tar.xz && cd nasm-2.16.03
          ./configure --prefix="$PREFIX" && make -j$NPROC && make install
          cd "$BUILD_DIR"
          export PATH="$PREFIX/bin:$PATH"

          # x264
          git clone --depth 1 https://code.videolan.org/videolan/x264.git
          cd x264
          ./configure --prefix="$PREFIX" --enable-static --disable-shared --disable-cli --disable-opencl
          make -j$NPROC && make install
          cd "$BUILD_DIR"

          # FFmpeg 7.1 (minimal static)
          git clone --depth 1 --branch n7.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" ./configure \
            --prefix="$PREFIX" \
            --enable-static --disable-shared --enable-gpl --enable-libx264 \
            --disable-programs --disable-doc --disable-htmlpages --disable-manpages \
            --disable-podpages --disable-txtpages --disable-network --disable-everything \
            --enable-encoder=libx264 --enable-encoder=aac \
            --enable-decoder=rawvideo --enable-decoder=aac --enable-decoder=h264 \
            --enable-muxer=mp4 --enable-muxer=mov \
            --enable-demuxer=mov --enable-demuxer=rawvideo \
            --enable-protocol=file \
            --enable-filter=aresample --enable-filter=scale --enable-filter=null --enable-filter=anull \
            --enable-swscale --enable-swresample \
            --enable-parser=h264 --enable-parser=aac \
            --extra-cflags="-I$PREFIX/include" --extra-ldflags="-L$PREFIX/lib"
          make -j$NPROC && make install

      - name: Set FFmpeg env (macOS)
        if: contains(matrix.platform, 'macos')
        run: |
          PREFIX="$PWD/ffmpeg-build/install"
          echo "FFMPEG_DIR=$PREFIX" >> $GITHUB_ENV
          echo "FFMPEG_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig" >> $GITHUB_ENV

      # ── Linux: build static FFmpeg ─────────────────────────────
      - name: Install build deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libasound2-dev pkg-config cmake nasm

      - name: Build static FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04' && steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          set -e
          NPROC=$(nproc)
          BUILD_DIR="$PWD/ffmpeg-build"
          PREFIX="$BUILD_DIR/install"
          mkdir -p "$BUILD_DIR" && cd "$BUILD_DIR"

          # x264
          git clone --depth 1 https://code.videolan.org/videolan/x264.git
          cd x264
          ./configure --prefix="$PREFIX" --enable-static --disable-shared --disable-cli --disable-opencl --enable-pic
          make -j$NPROC && make install
          cd "$BUILD_DIR"

          # FFmpeg 7.1 (minimal static)
          git clone --depth 1 --branch n7.1 https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" ./configure \
            --prefix="$PREFIX" \
            --enable-static --disable-shared --enable-gpl --enable-libx264 --enable-pic \
            --disable-programs --disable-doc --disable-htmlpages --disable-manpages \
            --disable-podpages --disable-txtpages --disable-network --disable-everything \
            --enable-encoder=libx264 --enable-encoder=aac \
            --enable-decoder=rawvideo --enable-decoder=aac --enable-decoder=h264 \
            --enable-muxer=mp4 --enable-muxer=mov \
            --enable-demuxer=mov --enable-demuxer=rawvideo \
            --enable-protocol=file \
            --enable-filter=aresample --enable-filter=scale --enable-filter=null --enable-filter=anull \
            --enable-swscale --enable-swresample \
            --enable-parser=h264 --enable-parser=aac \
            --extra-cflags="-I$PREFIX/include -fPIC" --extra-ldflags="-L$PREFIX/lib"
          make -j$NPROC && make install

      - name: Set FFmpeg env (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          PREFIX="$PWD/ffmpeg-build/install"
          echo "FFMPEG_DIR=$PREFIX" >> $GITHUB_ENV
          echo "FFMPEG_STATIC=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$PREFIX/lib/pkgconfig" >> $GITHUB_ENV

      # ── Windows: use vcpkg for static FFmpeg ───────────────────
      - name: Setup vcpkg cache (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-ffmpeg-win64-static-v2

      - name: Install FFmpeg via vcpkg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          vcpkg install ffmpeg[core,avcodec,avformat,avutil,swscale,swresample,x264,gpl]:x64-windows-static
          vcpkg integrate install

      - name: Set FFmpeg env (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg\installed\x64-windows-static"
          echo "FFMPEG_DIR=$vcpkgRoot" >> $env:GITHUB_ENV
          echo "FFMPEG_STATIC=1" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=$vcpkgRoot\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=0" >> $env:GITHUB_ENV
          echo "RUSTFLAGS=-C target-feature=+crt-static" >> $env:GITHUB_ENV

      # ── Build app ──────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Effective Recorder ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
